<!DOCTYPE html>
<html>
<head>
    <title>TS Internal Helpdesk</title>

    <style>

        body{
            font-family: Arial;
            background:#f4f6fb;
            margin:0;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .container{
            width:800px;
            background:white;
            padding:30px;
            border-radius:15px;
            box-shadow:0px 5px 20px rgba(0,0,0,0.1);
        }

        h1{
            color:#B8860B;
        }

        button{
            background:#B8860B;
            color:white;
            border:none;
            padding:10px 15px;
            border-radius:8px;
            cursor:pointer;
            margin-bottom:20px;
        }

        .ticket{
            border-bottom:1px solid #eee;
            padding:10px 0;
        }

    </style>
</head>

<body>

<div class="container">

    <h1>Chat with TS Internal HelpDesk</h1>
    <p>This channel is for internal requests from all departments.</p>

    <button onclick="loadTickets()">Refresh Tickets</button>

    <div id="tickets"></div>

</div>

<script>

async function loadTickets(){

    const res = await fetch("/tickets");
    const data = await res.json();

    let html = "";

    data.forEach(ticket=>{
        html += `
        <div class="ticket">
            <b>Ticket ID:</b> ${ticket[0] || ""} <br>
            <b>Name:</b> ${ticket[2] || ""} <br>
            <b>Status:</b> ${ticket[10] || ""} <br>
            <b>Message:</b> ${ticket[11] || ""} <br>
        </div>
        `;
    });

    document.getElementById("tickets").innerHTML = html;
}

loadTickets();

</script>

</body>
</html>
